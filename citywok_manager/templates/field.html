{{ field.label }}
{% if field.errors %}
{{ field(class="form-control is-invalid") }}
<div class="invalid-feedback">
    {% for error in field.errors %}
    <span>{{ error }}</span>
    {% endfor %}
</div>
{% else %}
{{ field(class="form-control") }}
<small class="form-text text-muted">{{message}}</small>
{% endif %}
