{% extends 'layout.html' %}
{% set active_page = "account" %}
{% block content %}
<div class="px-2 px-md-5 pb-5">
    <h1>{{title}}</h1>
    <hr class="mb-4">
    <h3 class="ml-2">账户信息</h3>
</div>
{% endblock content %}


<form action="" method="post" class="px-3" novalidate>
    {{ form.hidden_tag() }}
    <fieldset>
        <div class="form-group col-md-6">
            {% with field=form.username %}
            {% include 'field.html' %}
            {% endwith %}
        </div>
        <div class="form-group col-md-6">
            {% with field=form.email %}
            {% include 'field.html' %}
            {% endwith %}
        </div>
        <input type="submit" value="更新" name="update" class="btn btn-info ml-3" form="update_form">
    </fieldset>
</form>
